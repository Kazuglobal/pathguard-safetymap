<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spark Viewer PoC</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #070b12;
      color: #e7edf8;
      font-family: "Segoe UI", "Noto Sans JP", sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 20;
      width: min(360px, calc(100vw - 32px));
      background: rgba(10, 16, 30, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 14px;
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .label {
      font-size: 12px;
      color: #cbd5e1;
      margin-bottom: 4px;
      display: block;
    }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    input[type="text"] {
      flex: 1;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(15, 23, 42, 0.9);
      color: #f8fafc;
      padding: 8px 10px;
      font-size: 13px;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #60a5fa;
    }
    button {
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #2563eb, #0ea5e9);
      color: #f8fafc;
      font-weight: 600;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
    }
    #status {
      font-size: 12px;
      color: #93c5fd;
      min-height: 18px;
    }
    #tips {
      font-size: 11px;
      line-height: 1.45;
      color: #94a3b8;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
      padding-top: 8px;
    }
    #canvas-host {
      width: 100%;
      height: 100%;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.181.1/build/three.module.js",
        "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.0.0-preview/spark.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="app">
    <div id="panel">
      <div>
        <label for="splat-url" class="label">Splat URL (.ply / .spz)</label>
        <div class="row">
          <input id="splat-url" type="text" value="/splats/school-route.ply" />
          <button id="load-button" type="button">Load</button>
        </div>
      </div>
      <div>
        <label for="lod-scale" class="label">LOD スケール: <span id="lod-value">1.00</span></label>
        <input id="lod-scale" type="range" min="0.25" max="2.00" step="0.05" value="1.00" />
      </div>
      <div id="status">初期化中...</div>
      <div id="tips">
        WASD: 移動 / Shift: 高速移動<br />
        ドラッグ: 回転 / ホイール: ズーム<br />
        サーバーに <code>public/splats/*.ply</code> を置くだけで読込可能
      </div>
    </div>
    <div id="canvas-host"></div>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.181.1/examples/jsm/controls/OrbitControls.js";
    import { SplatMesh } from "@sparkjsdev/spark";

    const host = document.getElementById("canvas-host");
    const statusEl = document.getElementById("status");
    const urlInput = document.getElementById("splat-url");
    const loadButton = document.getElementById("load-button");
    const lodSlider = document.getElementById("lod-scale");
    const lodValue = document.getElementById("lod-value");
    const querySplat = new URLSearchParams(window.location.search).get("splat");
    if (querySplat) {
      urlInput.value = querySplat;
    }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x070b12);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(0, 0, 3);

    const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    host.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 0.5;
    controls.maxDistance = 80;

    const keyState = { w: false, a: false, s: false, d: false, shift: false };
    const WALK_SPEED = 2.2;
    const SPRINT_MULTIPLIER = 2.0;
    let currentSplat = null;
    let lastTimeMs = performance.now();
    let loadToken = 0;

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.style.color = isError ? "#fca5a5" : "#93c5fd";
    }

    function clampLod(value) {
      return Math.max(0.25, Math.min(2.0, value));
    }

    function toErrorMessage(error) {
      if (error instanceof Error) {
        return error.message;
      }
      if (typeof error === "string") {
        return error;
      }
      return "不明なエラー";
    }

    function applyLod(mesh, lodScale) {
      if (!mesh) return;
      if (typeof mesh.setAdaptiveLodScale === "function") {
        mesh.setAdaptiveLodScale(lodScale);
        return;
      }
      mesh.lodScale = lodScale;
    }

    async function loadSplat(url) {
      const token = ++loadToken;
      if (!url) {
        setStatus("読み込みエラー: URLを入力してください", true);
        return;
      }
      setStatus("読み込み中...");
      try {
        if (currentSplat) {
          scene.remove(currentSplat);
          currentSplat.dispose?.();
        }

        currentSplat = new SplatMesh({
          url,
          lod: true,
          enableLod: true,
          lodScale: clampLod(Number(lodSlider.value)),
          onLoad: (mesh) => {
            if (token !== loadToken) return;
            const box = mesh.getBoundingBox?.();
            if (box && !box.isEmpty?.()) {
              const center = new THREE.Vector3();
              const size = new THREE.Vector3();
              box.getCenter(center);
              box.getSize(size);
              const maxDim = Math.max(size.x, size.y, size.z) || 1;
              camera.position.copy(center).add(new THREE.Vector3(0, 0, maxDim * 1.8));
              controls.target.copy(center);
              controls.update();
            }
            setStatus("読み込み完了");
          },
          onProgress: () => {},
        });

        currentSplat.position.set(0, 0, -3);
        scene.add(currentSplat);

        if (currentSplat?.initialized && typeof currentSplat.initialized.then === "function") {
          await currentSplat.initialized;
        }
      } catch (error) {
        if (token !== loadToken) return;
        setStatus(`読み込みエラー: ${toErrorMessage(error)}`, true);
      }
    }

    function updateMovement(deltaTime) {
      const speed = WALK_SPEED * deltaTime * (keyState.shift ? SPRINT_MULTIPLIER : 1);
      let dx = 0;
      let dz = 0;
      if (keyState.w) dz -= speed;
      if (keyState.s) dz += speed;
      if (keyState.a) dx -= speed;
      if (keyState.d) dx += speed;
      if (dx === 0 && dz === 0) return;
      const movement = new THREE.Vector3(dx, 0, dz);
      camera.position.add(movement);
      controls.target.add(movement);
    }

    function onKeyDown(event) {
      if (event.target instanceof HTMLElement) {
        const tag = event.target.tagName;
        if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || event.target.isContentEditable) {
          return;
        }
      }
      const key = event.key.toLowerCase();
      if (key === "w") keyState.w = true;
      if (key === "a") keyState.a = true;
      if (key === "s") keyState.s = true;
      if (key === "d") keyState.d = true;
      if (key === "shift") keyState.shift = true;
      if (key === "w" || key === "a" || key === "s" || key === "d") {
        event.preventDefault();
      }
    }

    function onKeyUp(event) {
      const key = event.key.toLowerCase();
      if (key === "w") keyState.w = false;
      if (key === "a") keyState.a = false;
      if (key === "s") keyState.s = false;
      if (key === "d") keyState.d = false;
      if (key === "shift") keyState.shift = false;
    }

    loadButton.addEventListener("click", () => loadSplat(urlInput.value.trim()));
    urlInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        loadSplat(urlInput.value.trim());
      }
    });

    lodSlider.addEventListener("input", () => {
      const value = clampLod(Number(lodSlider.value));
      lodValue.textContent = value.toFixed(2);
      applyLod(currentSplat, value);
    });
    lodValue.textContent = Number(lodSlider.value).toFixed(2);

    window.addEventListener("keydown", onKeyDown);
    window.addEventListener("keyup", onKeyUp);
    window.addEventListener("resize", () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
    window.addEventListener("error", (event) => {
      if (!event.message) return;
      if (event.message.includes("Failed to fetch")) {
        setStatus(`読み込みエラー: ${event.message}`, true);
      }
    });
    window.addEventListener("unhandledrejection", (event) => {
      const message = toErrorMessage(event.reason);
      if (message.includes("Failed to fetch") || message.includes(".ply") || message.includes(".spz")) {
        setStatus(`読み込みエラー: ${message}`, true);
      }
    });

    renderer.setAnimationLoop(() => {
      const now = performance.now();
      const deltaTime = Math.min((now - lastTimeMs) / 1000, 0.05);
      lastTimeMs = now;
      updateMovement(deltaTime);
      controls.update();
      renderer.render(scene, camera);
    });

    loadSplat(urlInput.value.trim());
  </script>
</body>
</html>
