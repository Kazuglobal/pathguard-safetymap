<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-chikushino-accident" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEE2E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:white;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-chikushino-accident)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#EF4444" opacity="0.1"/>
  <circle cx="1100" cy="530" r="150" fill="#EF4444" opacity="0.1"/>

  <!-- Central icon -->
  <text x="600" y="280" text-anchor="middle" font-size="120" filter="url(#shadow)">⚠️</text>

  <!-- Title card -->
  <rect x="100" y="400" width="1000" height="180" rx="20" fill="white" filter="url(#shadow)" opacity="0.95"/>

  <!-- Category badge -->
  <rect x="130" y="430" width="140" height="36" rx="18" fill="#EF4444"/>
  <text x="200" y="455" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">SAFE MAGAZINE</text>

  <!-- Title text -->
  <text x="130" y="520" font-family="sans-serif" font-size="36" font-weight="bold" fill="#1F2937">対策済み通学路でも事故発生</text>

  <!-- Footer line -->
  <rect x="130" y="550" width="60" height="4" rx="2" fill="#EF4444"/>
</svg>