<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="content-bg-hard-vs-soft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEE2E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:white;stop-opacity:1" />
    </linearGradient>
    <filter id="content-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#content-bg-hard-vs-soft)"/>

  <!-- Decorative elements -->
  <circle cx="700" cy="100" r="80" fill="#EF4444" opacity="0.1"/>
  <circle cx="100" cy="500" r="60" fill="#EF4444" opacity="0.1"/>

  <!-- Central icon -->
  <text x="400" y="280" text-anchor="middle" font-size="100" filter="url(#content-shadow)">⚖️</text>

  <!-- Description card -->
  <rect x="150" y="380" width="500" height="100" rx="16" fill="white" filter="url(#content-shadow)" opacity="0.95"/>

  <!-- Description text -->
  <text x="400" y="440" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#374151">ハード対策 vs ソフト対策</text>

  <!-- Accent line -->
  <rect x="350" y="460" width="100" height="4" rx="2" fill="#EF4444"/>
</svg>